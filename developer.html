<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f8bbd0, #e1bee7);
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 25px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .15);
        }

        .card h1 {
            color: #e57399;
            margin-bottom: 15px;
        }

        .card p {
            color: #666;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #e57399;
            color: white;
            text-decoration: none;
            border-radius: 30px;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Akma, Arul & Ilham</h1>

        <p>
            Web Developer & Designer
            <br>
            Penyusun website Baby Storylens.
        </p>

        <a href="index.html" class="btn">
            Kembali ke Website
        </a>

    </div>

</body>

</html>
